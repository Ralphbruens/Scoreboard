<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Scoreboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; text-align: center; }
    table { margin: 20px auto; border-collapse: collapse; width: 60%; }
    th, td { padding: 10px; border: 1px solid #ccc; }
    th { background-color: #4CAF50; color: white; }
    tr:first-child { background-color: gold; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Live Scoreboard</h1>
  <table id="scoreTable">
    <thead><tr><th>Name</th><th>Score</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    // Replace with your Supabase project info
    const SUPABASE_URL = 'https://dgvhgafduvtrjmxwuocj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndmhnYWZkdXZ0cmpteHd1b2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NzkxNjMsImV4cCI6MjA3MzE1NTE2M30.BV_w6EKkUWc-TKVLh1dpcnpuKT_2qNt1oo6Z3jReP_0';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadScores() {
      let { data, error } = await supabase
        .from('scores')
        .select('*')
        .order('score', { ascending: false });

      if (error) {
        console.error('Error fetching scores:', error);
        return;
      }

      const tbody = document.querySelector('#scoreTable tbody');
      tbody.innerHTML = '';

      data.forEach((row, index) => {
        const tr = document.createElement('tr');
        if (index === 0) tr.style.backgroundColor = 'gold';
        tr.innerHTML = `<td>${row.name}</td><td>${row.score}</td>`;
        tbody.appendChild(tr);
      });
    }

    // Initial load
    loadScores();

    // Subscribe to real-time changes
    supabase
      .channel('score-updates')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, payload => {
        loadScores();
      })
      .subscribe();
  </script>
</body>
</html>
