<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Scoreboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Live Scoreboard</h1>
  <table id="scoreTable">
    <thead>
      <tr><th>Name</th><th>Score</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // TODO: Replace with your Supabase project details
    const SUPABASE_URL = 'https://dgvhgafduvtrjmxwuocj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndmhnYWZkdXZ0cmpteHd1b2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NzkxNjMsImV4cCI6MjA3MzE1NTE2M30.BV_w6EKkUWc-TKVLh1dpcnpuKT_2qNt1oo6Z3jReP_0';
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Render scores in table
    function renderScores(scores) {
      const tbody = document.querySelector('#scoreTable tbody');
      tbody.innerHTML = '';
      scores.forEach((row, idx) => {
        const tr = document.createElement('tr');
        if (idx === 0) tr.classList.add('top-score');
        tr.innerHTML = `<td>${row.name}</td><td>${row.score}</td>`;
        tbody.appendChild(tr);
      });
    }

    // Fetch and display scores
    async function fetchScores() {
      const { data, error } = await supabase
        .from('scores')
        .select('name,score')
        .order('score', { ascending: false });
      if (error) {
        console.error('Error fetching scores:', error);
        return;
      }
      renderScores(data || []);
    }

    // Auto-refresh every 5 seconds
    setInterval(fetchScores, 5000);
    fetchScores();

    // Optional: Real-time updates
    supabase.channel('public:scores')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, payload => {
        fetchScores();
      })
      .subscribe();
  </script>
</body>
</html>
