<!DOCTYPE html>
<html>
<head>
  <title>Scoreboard</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    table { margin: auto; border-collapse: collapse; width: 60%; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; }
    th { background: #eee; }
    .leader { background: gold; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Scoreboard</h1>
  <table id="scoreTable">
    <thead><tr><th>Name</th><th>Score</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZuaHsYDRldLWePSkvblbmSVBRYO5lSy1FW5AEav7ddozd4VjmIfLxAbysIu32f9SGnjiXY1aQ02x_/pub?gid=0&single=true&output=csv"; // paste published CSV link

    async function loadScores() {
      let res = await fetch(sheetUrl);
      let text = await res.text();
      let rows = text.split("\n").map(r => r.split(","));
      let data = rows.slice(1).map(r => ({name: r[0], score: parseInt(r[1])||0}));
      data.sort((a,b) => b.score - a.score);
      let tbody = document.querySelector("#scoreTable tbody");
      tbody.innerHTML = "";
      data.forEach((p,i) => {
        let row = document.createElement("tr");
        if(i===0) row.classList.add("leader");
        row.innerHTML = `<td>${p.name}</td><td>${p.score}</td>`;
        tbody.appendChild(row);
      });
    }

    loadScores();
    setInterval(loadScores, 5000); // refresh every 5 seconds
  </script>
</body>
</html>
