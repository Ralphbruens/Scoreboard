<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    input { padding: 0.5rem; margin: 0.5rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>
  <form id="scoreForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="number" id="score" placeholder="Score" required>
    <button type="submit">Add / Update Score</button>
  </form>

    <script>
      // --- Supabase setup ---
      // Replace with your Supabase project details
      const SUPABASE_URL = 'https://dgvhgafduvtrjmxwuocj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndmhnYWZkdXZ0cmpteHd1b2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NzkxNjMsImV4cCI6MjA3MzE1NTE2M30.BV_w6EKkUWc-TKVLh1dpcnpuKT_2qNt1oo6Z3jReP_0';
    const supabase = window.Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('scoreForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const score = parseInt(document.getElementById('score').value, 10);
      if (!name || isNaN(score)) return;

      // Upsert: add new or update existing
      const { data, error } = await supabase
        .from('scores')
        .upsert({ name, score });

      if (error) console.error('Error updating score:', error);
      else document.getElementById('scoreForm').reset();
    });
  </script>
</body>
</html>
